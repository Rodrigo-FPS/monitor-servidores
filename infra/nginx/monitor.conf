limit_req_zone $binary_remote_addr zone=heartbeat:10m rate=10r/s; #maximo 10 latidos por segundo por IP

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri; #redirigir todo HTTP a HTTPS
}

server {
    listen 443 ssl;
    server_name TU_DOMINIO;

    ssl_certificate     /etc/letsencrypt/live/TU_DOMINIO/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    #latidos y apagados van a FastAPI
    location ~ ^/api/(heartbeat|shutdown)$ {
        limit_req zone=heartbeat burst=20 nodelay;

        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr; #FastAPI usa esto para validar la IP del servidor
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    #todo lo demas va a Laravel via PHP-FPM
    location / {
        root  /var/www/monitor/public;
        index index.php;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   unix:/var/run/php/php8.5-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
    }

    location ~ /\.(?!well-known) {
        deny all; #bloquear acceso a archivos ocultos excepto certbot
    }
}
