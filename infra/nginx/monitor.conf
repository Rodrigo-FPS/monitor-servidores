# Zonas de rate-limit y de conexiones (contexto http).
limit_req_zone  $binary_remote_addr zone=heartbeat:10m rate=10r/s;  #latidos: 10/s por IP
limit_req_zone  $binary_remote_addr zone=login:10m     rate=10r/m;  #login: 10/min por IP (anti fuerza bruta)
limit_req_zone  $binary_remote_addr zone=web:10m       rate=30r/s;  #resto de rutas dinamicas
limit_conn_zone $binary_remote_addr zone=conn_por_ip:10m;           #conexiones concurrentes por IP

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri; #redirigir todo HTTP a HTTPS
}

server {
    listen 443 ssl default_server;
    # En red local sin dominio usa _ (catch-all); el navegador identifica el servidor
    # por la IP, no por el nombre. Con dominio real sustituye _ por el FQDN.
    server_name _;

    # --- Opcion A: certificado autofirmado para IP (red local sin dominio) ---
    # Ver README seccion 10 para el comando de generacion.
    ssl_certificate     /etc/ssl/monitor/fullchain.pem;
    ssl_certificate_key /etc/ssl/monitor/privkey.pem;

    # --- Opcion B: Let's Encrypt (solo si tienes dominio publico con DNS) ---
    # ssl_certificate     /etc/letsencrypt/live/TU_DOMINIO/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    server_tokens off;            #no revelar la version de nginx
    root /var/www/monitor/public; #webroot comun a todas las locations

    #limites para mitigar DoS de capa 7 y slowloris
    client_max_body_size  64k;
    client_body_timeout   10s;
    client_header_timeout 10s;
    send_timeout          10s;
    limit_conn            conn_por_ip 20;

    #latidos y apagados van a FastAPI
    location ~ ^/api/(heartbeat|shutdown)$ {
        limit_req zone=heartbeat burst=20 nodelay;

        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        #FastAPI valida la IP con X-Real-IP. Ambos headers se fijan con $remote_addr
        #(proxy_set_header REEMPLAZA lo que envie el cliente) para que la IP de origen
        #no sea falsificable. No usar $proxy_add_x_forwarded_for: antepone el valor
        #del cliente y permitiria suplantar la IP registrada.
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    #rate-limit reforzado en el login (encima del bloqueo por IP de la app)
    location = /login {
        limit_req zone=login burst=5 nodelay;
        try_files $uri /index.php?$query_string;
    }

    #todo lo demas va a Laravel via PHP-FPM
    location / {
        index index.php;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        limit_req zone=web burst=60 nodelay;     #protege a PHP-FPM de floods
        fastcgi_hide_header X-Powered-By;         #no revelar la version de PHP
        fastcgi_pass   unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param  HTTPS on;                  #informa a Laravel que la conexion es TLS
        include        fastcgi_params;
    }

    location ~ /\.(?!well-known) {
        deny all; #bloquear acceso a archivos ocultos excepto certbot
    }
}
